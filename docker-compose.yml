services:
  dev-tools:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - MISE_VERSION=2026.1.7
        - TOOLS_DIR=/tools
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - dev-tools:/tools
    restart: no

volumes:
  dev-tools:
    name: dev-tools

